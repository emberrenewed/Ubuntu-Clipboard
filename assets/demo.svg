<?xml version="1.0" encoding="UTF-8"?>
<!--
  Animated demo of Clipd capturing clipboard items.
  Pure SVG/SMIL — renders inline on GitHub READMEs.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 660" width="1100" height="660">
  <defs>
    <linearGradient id="winBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#242424"/>
      <stop offset="1" stop-color="#1B1B1B"/>
    </linearGradient>
    <linearGradient id="rowSel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3584E4"/>
      <stop offset="1" stop-color="#2D75D0"/>
    </linearGradient>
    <linearGradient id="kurd" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ED1B24"/>
      <stop offset="50%"  stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#009A44"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FFE066"/>
      <stop offset="100%" stop-color="#E0A800"/>
    </radialGradient>
  </defs>

  <!-- Window chrome -->
  <rect x="20" y="20" width="1060" height="620" rx="14" fill="url(#winBg)" stroke="#333" stroke-width="1"/>
  <rect x="20" y="20" width="1060" height="44" rx="14" fill="#1B1B1B"/>
  <circle cx="44" cy="42" r="6" fill="#FF5F57"/>
  <circle cx="64" cy="42" r="6" fill="#FEBC2E"/>
  <circle cx="84" cy="42" r="6" fill="#28C840"/>
  <text x="540" y="46" font-family="Ubuntu,sans-serif" font-size="13" font-weight="600"
        text-anchor="middle" fill="#B8B8B8">Clipd — Clipboard History</text>

  <!-- Sidebar -->
  <rect x="20" y="64" width="240" height="576" fill="#1F1F1F"/>
  <g font-family="Ubuntu,sans-serif" font-size="14" fill="#D8D8D8">
    <rect x="32" y="80" width="216" height="36" rx="8" fill="#2A2A2A"/>
    <text x="56" y="103">📋  All</text>

    <text x="56" y="143">📌  Pinned</text>
    <text x="56" y="173">⭐  Favorites</text>
    <text x="56" y="203">📝  Text</text>
    <text x="56" y="233">⌨️  Code</text>
    <text x="56" y="263">🔗  URLs</text>
    <text x="56" y="293">🖼️  Images</text>
    <text x="56" y="323">📁  Files</text>
  </g>

  <!-- Search bar -->
  <rect x="280" y="80" width="780" height="36" rx="8" fill="#2A2A2A"/>
  <text x="306" y="104" font-family="Ubuntu,sans-serif" font-size="13" fill="#9A9A9A">
    🔍  Search clipboard…
  </text>

  <!-- ═══════════════════════ ITEM LIST (animated) ═══════════════════════ -->
  <g font-family="Ubuntu,sans-serif" font-size="13" fill="#E8E8E8">

    <!-- Item 1: code (always visible) -->
    <g transform="translate(280 130)">
      <rect width="380" height="64" rx="10" fill="url(#rowSel)" opacity="0.9"/>
      <text x="20" y="26" fill="#FFFFFF" font-weight="600">⌨ def hello(): return 42</text>
      <text x="20" y="48" fill="#E8E8E8" font-size="11">CODE · python · just now</text>
    </g>

    <!-- Item 2: URL appears at t=1s -->
    <g transform="translate(280 200)" opacity="0">
      <animate attributeName="opacity" values="0;1" begin="1s" dur="0.4s" fill="freeze"/>
      <rect width="380" height="64" rx="10" fill="#2A2A2A"/>
      <text x="20" y="26" font-weight="600">🔗 https://kurdistan.region/welcome</text>
      <text x="20" y="48" fill="#9A9A9A" font-size="11">URL · just now</text>
    </g>

    <!-- Item 3: text appears at t=2s -->
    <g transform="translate(280 270)" opacity="0">
      <animate attributeName="opacity" values="0;1" begin="2s" dur="0.4s" fill="freeze"/>
      <rect width="380" height="64" rx="10" fill="#2A2A2A"/>
      <text x="20" y="26" font-weight="600">📝 Roj baş — slav le hemûwan</text>
      <text x="20" y="48" fill="#9A9A9A" font-size="11">TEXT · just now</text>
    </g>

    <!-- Item 4: image appears at t=3s -->
    <g transform="translate(280 340)" opacity="0">
      <animate attributeName="opacity" values="0;1" begin="3s" dur="0.4s" fill="freeze"/>
      <rect width="380" height="64" rx="10" fill="#2A2A2A"/>
      <text x="20" y="26" font-weight="600">🖼 Image 1920×1080</text>
      <text x="20" y="48" fill="#9A9A9A" font-size="11">IMAGE · screenshot · just now</text>
    </g>

    <!-- Item 5: extra text at t=4s -->
    <g transform="translate(280 410)" opacity="0">
      <animate attributeName="opacity" values="0;1" begin="4s" dur="0.4s" fill="freeze"/>
      <rect width="380" height="64" rx="10" fill="#2A2A2A"/>
      <text x="20" y="26" font-weight="600">📝 git clone https://...</text>
      <text x="20" y="48" fill="#9A9A9A" font-size="11">TEXT · 1m ago</text>
    </g>
  </g>

  <!-- ═══════════════════════ PREVIEW PANE ═══════════════════════ -->
  <g transform="translate(680 130)">
    <rect width="380" height="480" rx="12" fill="#262626" stroke="#3A3A3A" stroke-width="1"/>

    <!-- header -->
    <text x="20" y="34" font-family="Ubuntu,sans-serif" font-size="11" font-weight="700" fill="#FFCC00">
      CODE · python
    </text>
    <text x="160" y="34" font-family="Ubuntu,sans-serif" font-size="11" fill="#888">just now</text>

    <!-- code block -->
    <rect x="20" y="56" width="340" height="160" rx="8" fill="#1A1A1A"/>
    <g font-family="JetBrains Mono,Fira Code,monospace" font-size="13">
      <text x="36" y="84" fill="#C792EA">def</text>
      <text x="76" y="84" fill="#82AAFF">hello</text>
      <text x="116" y="84" fill="#E8E8E8">():</text>
      <text x="52" y="108" fill="#C792EA">return</text>
      <text x="120" y="108" fill="#F78C6C">42</text>
    </g>

    <!-- paste button -->
    <rect x="20" y="240" width="120" height="40" rx="8" fill="#3584E4"/>
    <text x="80" y="265" font-family="Ubuntu,sans-serif" font-size="14" font-weight="600"
          fill="#FFFFFF" text-anchor="middle">Paste</text>

    <!-- icon row -->
    <g transform="translate(160 252)" font-family="Ubuntu,sans-serif" font-size="14" fill="#E8E8E8">
      <text x="0"   y="14">📋</text>
      <text x="34"  y="14">📌</text>
      <text x="68"  y="14">⭐</text>
      <text x="102" y="14">🗑</text>
    </g>
  </g>

  <!-- ═══════════════════════ FOOTER (Kurdistan brand) ═══════════════════════ -->
  <text x="540" y="618" font-family="Inter,sans-serif" font-size="22"
        font-weight="900" letter-spacing="6" fill="#ED1B24" text-anchor="middle">
    KURDISTAN
  </text>
  <rect x="380" y="630" width="320" height="4" rx="2" fill="url(#kurd)"/>
</svg>
