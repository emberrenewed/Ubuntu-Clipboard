<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <defs>
    <linearGradient id="key" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A3A3A"/>
      <stop offset="1" stop-color="#1F1F1F"/>
    </linearGradient>
  </defs>

  <rect width="480" height="200" rx="20" fill="#0E0E0E"/>

  <!-- Super -->
  <g transform="translate(60 60)">
    <rect width="120" height="80" rx="14" fill="url(#key)" stroke="#5A5A5A" stroke-width="1"/>
    <text x="60" y="46" font-family="Ubuntu,sans-serif" font-size="20" font-weight="700"
          fill="#F2F2F2" text-anchor="middle">Super</text>
    <text x="60" y="68" font-family="Ubuntu,sans-serif" font-size="11"
          fill="#FFCC00" text-anchor="middle">⊞ Win</text>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.4s" repeatCount="indefinite"/>
  </g>

  <text x="200" y="110" font-family="Ubuntu,sans-serif" font-size="28" font-weight="800"
        fill="#7A7A7A" text-anchor="middle">+</text>

  <!-- B -->
  <g transform="translate(220 60)">
    <rect width="80" height="80" rx="14" fill="url(#key)" stroke="#5A5A5A" stroke-width="1"/>
    <text x="40" y="56" font-family="Ubuntu,sans-serif" font-size="32" font-weight="800"
          fill="#F2F2F2" text-anchor="middle">B</text>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.4s" begin="0.2s" repeatCount="indefinite"/>
  </g>

  <!-- arrow -->
  <g transform="translate(320 100)">
    <path d="M0 0 L50 0 M40 -10 L50 0 L40 10" stroke="#FFCC00" stroke-width="3"
          fill="none" stroke-linecap="round"/>
  </g>

  <!-- Clipd label -->
  <g transform="translate(380 60)">
    <rect width="80" height="80" rx="14" fill="#ED1B24"/>
    <text x="40" y="56" font-family="Inter,sans-serif" font-size="22" font-weight="900"
          fill="#FFFFFF" text-anchor="middle">📋</text>
  </g>
</svg>
